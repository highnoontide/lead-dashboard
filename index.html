<!DOCTYPE html>
<html>
<head>
  <title>Lead Radar</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #0b0f14;
      color: #e6edf3;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #1f2933;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      color: #58a6ff;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #11161c;
      border: 1px solid #1f2933;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      transition: 0.2s;
    }

    .card:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 10px rgba(88,166,255,0.2);
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      margin-right: 5px;
      background: #1f2933;
    }

    .reddit { color: #ff4500; }
    .twitter { color: #1da1f2; }
    .craigslist { color: #6a0dad; }

    a {
      text-decoration: none;
      color: #58a6ff;
      font-size: 13px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #6e7681;
      margin-top: 30px;
    }

    .pulse {
      color: #3fb950;
      font-weight: 600;
    }

  </style>
</head>

<body>

<header>
  <h1>⚡ Lead Radar</h1>
  <div class="pulse">LIVE SIGNALS</div>
</header>

<div class="container">
  <div id="leads"></div>
</div>

<div class="footer">
  Built for high-urgency deal flow
</div>

<script>
fetch('data.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('leads');

    data.forEach(lead => {
      const div = document.createElement('div');
      div.className = 'card';

      let sourceClass = '';
      if (lead.source.toLowerCase().includes('reddit')) sourceClass = 'reddit';
      else if (lead.source.toLowerCase().includes('twitter')) sourceClass = 'twitter';
      else sourceClass = 'craigslist';

      div.innerHTML = `
        <div class="title">${lead.title}</div>
        <div class="meta">
          <span class="tag ${sourceClass}">${lead.source}</span>
        </div>
        <a href="${lead.link}" target="_blank">Open Lead →</a>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
